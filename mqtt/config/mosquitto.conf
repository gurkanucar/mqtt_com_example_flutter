# Mosquitto config — https://mosquitto.org/man/mosquitto-conf-5.html

persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mqtt` shows it
log_dest stdout

# MQTT listener
listener 1883

# MQTT over WebSockets (handy from a browser)
listener 9001
protocol websockets

# --- Auth ---
# Password required. The container generates /mosquitto/data/passwd from
# MQTT_USER / MQTT_PASSWORD (in .env) on startup — see the compose `command`.
allow_anonymous false
password_file /mosquitto/data/passwd
