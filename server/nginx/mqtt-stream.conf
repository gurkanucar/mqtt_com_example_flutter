# MQTT over TLS — nginx terminates TLS on 8883 and forwards to the
# plaintext mosquitto broker (docker) on 127.0.0.1:1883.
# Clients connect to: mqtts://stagingenvironment.space:8883
server {
    listen 8883 ssl;
    listen [::]:8883 ssl;

    ssl_certificate     /etc/letsencrypt/live/stagingenvironment.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stagingenvironment.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:MQTT_SSL:10m;

    proxy_pass 127.0.0.1:1883;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
}
