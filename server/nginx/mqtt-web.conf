# Port 80: ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name stagingenvironment.space;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# Port 443: MQTT over WebSocket Secure (for web clients) + status page
# Web clients connect to: wss://stagingenvironment.space/mqtt
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name stagingenvironment.space;

    ssl_certificate     /etc/letsencrypt/live/stagingenvironment.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stagingenvironment.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /mqtt {
        proxy_pass http://127.0.0.1:9001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        default_type text/plain;
        return 200 "MQTT staging broker. TLS: 8883 (mqtts) | WSS: 443 /mqtt | plain: 1883\n";
    }
}
